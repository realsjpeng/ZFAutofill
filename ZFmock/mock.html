<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=EmulateIE7">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>正方教务管理系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: SimSun, "宋体", Arial, sans-serif;
  font-size: 12px;
  color: #000;
  background: #d5e6f3;
  overflow: hidden;
}

/* ===== 顶部横幅 ===== */
.header {
  height: 72px;
  background: linear-gradient(180deg, #2f7bbd 0%, #1a5a94 48%, #114073 49%, #0d3560 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 2px solid #0b3058;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
}
.logo-area {
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo-icon {
  width: 44px;
  height: 44px;
  border: 2px solid rgba(255,255,255,.85);
  border-radius: 4px;
  background: rgba(255,255,255,.1);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font: bold 22px "Microsoft YaHei", SimSun, sans-serif;
}
.logo-text h1 {
  color: #fff;
  font-family: "Microsoft YaHei", SimSun, sans-serif;
  font-size: 22px;
  font-weight: normal;
  letter-spacing: 3px;
  text-shadow: 1px 1px 2px rgba(0,0,0,.4);
}
.user-info {
  color: #d8eaf8;
  font-size: 12px;
  line-height: 2;
  text-align: right;
}
.user-info .name {
  color: #fff;
  font-size: 13px;
}
.user-info a {
  color: #b8d4ee;
  text-decoration: none;
  margin-left: 14px;
}
.user-info a:hover { color: #fff; text-decoration: underline; }

/* ===== 导航菜单 ===== */
.nav-bar {
  height: 30px;
  background: linear-gradient(180deg, #e8f2fa 0%, #b8d4ea 100%);
  border-top: 1px solid #96bdd8;
  border-bottom: 1px solid #86a8c4;
  display: flex;
  align-items: center;
  padding: 0 10px;
  position: fixed;
  top: 72px; left: 0; right: 0;
  z-index: 9;
}
.nav-item {
  display: inline-block;
  padding: 0 18px;
  color: #0b3e6b;
  text-decoration: none;
  font-size: 13px;
  border-right: 1px solid #a0bdd4;
  line-height: 28px;
  cursor: pointer;
}
.nav-item:last-child { border-right: none; }
.nav-item:hover {
  background: #c8ddf0;
  color: #002855;
}
.nav-item .down-arrow::after {
  content: ' ▼';
  font-size: 9px;
}

/* ===== 面包屑 ===== */
.breadcrumb {
  height: 28px;
  background: #eef5fc;
  border: 1px solid #95bde0;
  border-bottom: none;
  line-height: 28px;
  padding: 0 10px;
  color: #064478;
  position: fixed;
  top: 102px; left: 0; right: 0;
  z-index: 8;
}

/* ===== 内容区域 ===== */
.content-wrap {
  position: fixed;
  top: 130px;
  left: 5px;
  right: 5px;
  bottom: 24px;
  border: 1px solid #8bb4d4;
  background: #fff;
  overflow: hidden;
}

/* ===== iframe ===== */
.iframe-box {
  width: 100%;
  height: 100%;
  border: none;
}

/* ===== 页脚 ===== */
.footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 22px;
  background: #e4edf5;
  border-top: 1px solid #c0d4e6;
  line-height: 22px;
  text-align: center;
  color: #668aa8;
  font-size: 11px;
}
.footer a { color: #4a7aaa; text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* ===== iframe内部样式 ===== */
.form-body {
  font-family: SimSun, "宋体", Arial, sans-serif;
  font-size: 12px;
  color: #000;
  background: #fff;
  padding: 6px;
}
.form-title {
  background: linear-gradient(180deg, #f0f6fb, #d3e4f3);
  border: 1px solid #8eb6d6;
  color: #064478;
  font-weight: bold;
  font-size: 13px;
  padding: 5px 10px;
  margin-bottom: 6px;
}
.form-header {
  border: 1px solid #8eb6d6;
  border-collapse: collapse;
  margin-bottom: 8px;
  width: 100%;
}
.form-header td {
  border: 1px solid #8eb6d6;
  padding: 5px 8px;
  text-align: left;
  font-size: 12px;
}
.form-header .label-td {
  width: 90px;
  background: #e8f1fa;
  color: #064478;
  text-align: right;
  font-weight: bold;
}
.form-controls {
  padding: 6px 8px;
  background: #f5faff;
  border: 1px solid #8eb6d6;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.form-controls label {
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}
.data-grid {
  width: 100%;
  border-collapse: collapse;
}
.data-grid th {
  background: linear-gradient(180deg, #f0f7fc, #d0e3f2);
  border: 1px solid #8eb6d6;
  padding: 4px 6px;
  font-weight: normal;
  color: #064478;
  text-align: center;
  font-size: 12px;
}
.data-grid td {
  border: 1px solid #8eb6d6;
  padding: 3px 6px;
  text-align: center;
  font-size: 12px;
}
.data-grid tbody tr:nth-child(even) {
  background: #f5f9fd;
}
.data-grid td.name-td {
  text-align: left;
  padding-left: 8px;
}
.data-grid input[type="text"] {
  width: 64px;
  height: 20px;
  border: 1px solid #7a9ab5;
  text-align: center;
  font-size: 12px;
  font-family: SimSun, "宋体", sans-serif;
}
.data-grid input[type="text"]:focus {
  border-color: #2b6cb8;
  outline: none;
}
.btn-row {
  margin-top: 10px;
  display: flex;
  justify-content: center;
  gap: 10px;
}
.btn-row button {
  min-width: 72px;
  height: 24px;
  padding: 0 16px;
  border: 1px solid #7aa3c2;
  background: linear-gradient(180deg, #ffffff, #d8e8f4);
  color: #064478;
  font-size: 12px;
  font-family: SimSun, "宋体", sans-serif;
  cursor: pointer;
}
.btn-row button:hover {
  background: linear-gradient(180deg, #ffffff, #c8ddf0);
}
.form-note {
  margin-top: 8px;
  font-size: 11px;
  color: #999;
  text-align: center;
}
</style>
</head>
