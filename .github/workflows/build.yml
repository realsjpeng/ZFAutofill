name: Build Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: ZFAutofill-windows.exe
            binary: ZFAutofill.exe
            sep: ";"
          - os: macos-latest
            artifact: ZFAutofill-macos
            binary: ZFAutofill
            sep: ":"
          - os: ubuntu-22.04
            artifact: ZFAutofill-linux
            binary: ZFAutofill
            sep: ":"
            system_deps: |
              sudo apt-get update
              sudo apt-get install -y \
                libxcb-xinerama0 libxkbcommon-x11-0 libxcb-cursor0 \
                libgl1 libglib2.0-0 \
                libnss3 libxss1 libasound2 libdbus-1-3 \
                libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
                libgbm1 libpango-1.0-0 libcairo2 libatk1.0-0 \
                libatk-bridge2.0-0 libcups2 libdrm2 \
                libxshmfence1 fonts-liberation \
                libxext6 libxrender1 libfontconfig1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: ${{ matrix.system_deps }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name ZFAutofill \
            --add-data "config.json${{ matrix.sep }}." \
            --collect-all PyQt5 \
            --collect-all PyQtWebEngine \
            --hidden-import gui \
            --hidden-import icons \
            --hidden-import i18n \
            --hidden-import excel_dialog \
            --hidden-import file_reader \
            --hidden-import run_scores \
            main.py

      - name: Rename binary
        shell: bash
        run: mv "dist/${{ matrix.binary }}" "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create Release & Upload Assets
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
